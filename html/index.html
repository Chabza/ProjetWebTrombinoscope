            <div>

        </nav>
    </header>

    <main>

        <div class="radio">
            <fieldset >
                <legend>Type d'affichage</legend>
                <input type="radio" name="typeAffichage" id="liste" value="liste" checked>
                <label for="liste">Liste</label>
                <input type="radio" name="typeAffichage" id="cartes" value="cartes">
                <label for="cartes">Cartes</label>
            </fieldset>

    <h2>Liste des apprenants</h2>

        <div class="tab" id="tableau">
            <table>
            <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Ville</th>
                        <th>Detail</th>
                    </tr>
            </thead>
            <tbody id="listeApprenants">

            </tbody>
            </table>
        </div>

        <div id="listeCartes">

        </div>

    </main>
    
    <footer>
    </footer>

    <!-- Tâche 3.1 : Modale détail apprenant -->
    <div id="modale" role="dialog" aria-modal="true" aria-labelledby="modalNom">
        <div class="modale-contenu">
            <button id="modalFermer" aria-label="Fermer">&times;</button>
            <img id="modalAvatar" src="" alt="" />
            <div class="modale-infos">
                <p><strong>Nom :</strong> <span id="modalNom"></span></p>
                <p><strong>Prénom :</strong> <span id="modalPrenom"></span></p>
                <p><strong>Ville :</strong> <span id="modalVille"></span></p>
                <p><strong>Anecdotes :</strong></p>
                <p id="modalAnecdotes"></p>
            </div>
